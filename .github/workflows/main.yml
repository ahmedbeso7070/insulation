name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup Theos SPM config
      run: make spm
    - name: Build
      run: swift build -v
    - name: Run tests
      run: swift test -v
